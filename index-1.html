<body>
<div id="root"></div>
<script>
/* ---------- utilities ---------- */
const $ = (sel, el=document) => el.querySelector(sel);
const h = (tag, props={}, children=[]) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(props||{})) {
    if (k === "style") Object.assign(el.style, v);
    else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") el.innerHTML = v;
    else if (v !== false && v !== null && v !== undefined) el.setAttribute(k, v);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if (c===null||c===undefined) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
};
const fmtDate = (d) => d.toISOString().slice(0,10);
function prettyDate(dStr){
  const today = fmtDate(new Date());
  if (dStr===today) return "Today";
  const y = new Date(); y.setDate(y.getDate()-1);
  if (dStr===fmtDate(y)) return "Yesterday";
  return new Date(dStr+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
}
function fmtTime(ts){ return new Date(ts).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); }
const sleep = (ms) => new Promise(r=>setTimeout(r,ms));

/* ---------- storage (real browser localStorage — persists on this device) ---------- */
const store = {
  get(key, fallback=null){
    try { const v = localStorage.getItem(key); return v===null ? fallback : JSON.parse(v); }
    catch(e){ return fallback; }
  },
  set(key, value){
    try { localStorage.setItem(key, JSON.stringify(value)); return true; }
    catch(e){ return false; }
  }
};

async function withRetry(fn, attempts=4){
  let lastErr;
  for (let i=0;i<attempts;i++){
    try { return await fn(); }
    catch(e){ lastErr=e; if(i<attempts-1) await sleep(400*Math.pow(2,i)); }
  }
  throw lastErr;
}

/* ---------- food lookup via user's own Anthropic API key ---------- */
async function lookupFood(text, apiKey){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{
        role: "user",
        content: `You are a nutrition database. The user describes food/drink they consumed, possibly multiple items with quantities (e.g. "2 idli and a tea", "large latte", "chicken biryani").

Respond with ONLY a raw JSON array, no markdown fences, no prose. Each element:
{"name": "short item name including quantity", "calories": integer, "protein": integer_grams, "carbs": integer_grams, "fat": integer_grams}

Use realistic standard nutrition estimates (Indian and international foods both apply). Assume one typical serving if no quantity is stated. If the text isn't food/drink, respond with exactly: []

User input: "${text}"`
      }]
    })
  });
  if (!res.ok) {
    const errBody = await res.json().catch(()=>({}));
    throw new Error(errBody?.error?.message || `Request failed (${res.status})`);
  }
  const data = await res.json();
  const textBlock = (data.content||[]).find(b=>b.type==="text");
  if (!textBlock) throw new Error("No response");
  const cleaned = textBlock.text.replace(/```json|```/g,"").trim();
  const parsed = JSON.parse(cleaned);
  if (!Array.isArray(parsed)) throw new Error("Bad format");
  return parsed.filter(it=>it&&it.name&&Number.isFinite(it.calories)).map(it=>({
    name:String(it.name), calories:Math.round(it.calories),
    protein:Math.round(it.protein||0), carbs:Math.round(it.carbs||0), fat:Math.round(it.fat||0)
  }));
}

/* ---------- app state ---------- */
const state = {
  dateKey: fmtDate(new Date()),
  goal: store.get("nutrition:goal", 2000),
  apiKey: store.get("nutrition:apikey", ""),
  entries: [],
  input: "",
  thinking: false,
  error: "",
  syncState: "synced",
  showSettings: false,
  showGoalEdit: false,
  showBMIModal: false,
  profile: store.get("nutrition:profile", { height:"", weight:"", age:"", sex:"male", activity:"1.375", goalType:"maintain" }),
};

function loadDay(dateKey){
  state.entries = store.get(`nutrition:day:${dateKey}`, []);
}
loadDay(state.dateKey);

function saveDay(){
  state.syncState = "syncing"; render();
  const ok = store.set(`nutrition:day:${state.dateKey}`, state.entries);
  state.syncState = ok ? "synced" : "unsynced";
  if (!ok) state.error = "Your entries are safe on screen, but the last save didn't sync. Tap retry.";
  render();
}

function isToday(){ return state.dateKey === fmtDate(new Date()); }

function totals(){
  return state.entries.reduce((acc,e)=>{
    e.items.forEach(it=>{ acc.cal+=it.calories; acc.protein+=it.protein; acc.carbs+=it.carbs; acc.fat+=it.fat; });
    return acc;
  }, {cal:0,protein:0,carbs:0,fat:0});
}

/* ---------- actions ---------- */
function shiftDay(delta){
  const d = new Date(state.dateKey+"T00:00:00");
  d.setDate(d.getDate()+delta);
  const next = fmtDate(d);
  if (next > fmtDate(new Date())) return;
  state.dateKey = next;
  loadDay(next);
  render();
}

async function handleSend(){
  const text = state.input.trim();
  if (!text || state.thinking) return;
  if (!state.apiKey){
    state.showSettings = true; render(); return;
  }
  state.input = ""; state.error = ""; state.thinking = true; render();
  try {
    const items = await withRetry(()=>lookupFood(text, state.apiKey), 2);
    if (items.length===0){
      state.error = 'Couldn\'t identify food in that — try something like "1 boiled egg".';
    } else {
      state.entries.push({ id:Date.now().toString(), ts:Date.now(), text, items });
      saveDay();
    }
  } catch(e){
    state.error = e.message && e.message.includes("credit") ? e.message :
      (e.message && e.message.toLowerCase().includes("key") ? "That API key was rejected — check it in Settings." :
      "Couldn't look that up — check your connection and try again.");
  }
  state.thinking = false; render();
}

function removeEntry(id){
  state.entries = state.entries.filter(e=>e.id!==id);
  saveDay();
}

function saveApiKey(key){
  state.apiKey = key.trim();
  store.set("nutrition:apikey", state.apiKey);
  state.showSettings = false; render();
}

function saveGoal(val){
  const n = parseInt(val,10);
  if (n && n>0){ state.goal = n; store.set("nutrition:goal", n); }
  state.showGoalEdit = false; render();
}

/* ---------- BMI / calorie goal calculator ---------- */
function bmiValue(weightKg, heightCm){
  if (!weightKg || !heightCm) return null;
  const m = heightCm/100;
  return weightKg/(m*m);
}
function bmiCategory(bmi){
  if (bmi==null) return "";
  if (bmi < 18.5) return "Underweight";
  if (bmi < 25) return "Normal";
  if (bmi < 30) return "Overweight";
  return "Obese";
}
function calcBMR(weightKg, heightCm, age, sex){
  const base = 10*weightKg + 6.25*heightCm - 5*age;
  return sex === "male" ? base + 5 : base - 161;
}
function suggestedCalories(bmr, activity, goalType){
  const tdee = bmr * activity;
  if (goalType === "lose") return Math.round(tdee - 500);
  if (goalType === "gain") return Math.round(tdee + 400);
  return Math.round(tdee);
}
function saveProfile(p){
  state.profile = p;
  store.set("nutrition:profile", p);
  render();
}

/* ---------- render ---------- */
function MacroCard(icon, label, value, color){
  return h("div",{style:{flex:"1",background:"#FBF8F0",border:"1px solid #E3DCC7",borderRadius:"10px",padding:"9px 8px",textAlign:"center"}},[
    h("div",{style:{fontSize:"16px",marginBottom:"3px"}},icon),
    h("div",{class:"ft-mono",style:{fontSize:"15px",fontWeight:"700",color:"#22201D"}},value+"g"),
    h("div",{style:{fontSize:"9.5px",color:"#8A8375",letterSpacing:"0.3px"}},label)
  ]);
}

function SyncBadge(){
  if (state.syncState==="syncing") return h("span",{style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"10px",color:"#8A8375"}},[h("span",{class:"ft-spin"},"↻")," saving"]);
  if (state.syncState==="unsynced") return h("button",{class:"ft-btn",onClick:saveDay,style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"10px",color:"#B0503B",background:"none",border:"none",padding:"0"}},["⚠ not saved · retry"]);
  return h("span",{style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"10px",color:"#5C7A5C"}},["✓ saved"]);
}

function SettingsModal(){
  let val = state.apiKey;
  const input = h("input",{type:"password",placeholder:"sk-ant-...",value:val,
    style:{width:"100%",boxSizing:"border-box",padding:"11px 12px",borderRadius:"9px",border:"1px solid #C9C2B0",fontSize:14,marginBottom:"10px",fontFamily:"'Space Mono',monospace"}});
  input.addEventListener("input",e=>val=e.target.value);
  return h("div",{class:"modal-overlay",onClick:(e)=>{ if(e.target.classList.contains("modal-overlay")){ state.showSettings=false; render(); } }},[
    h("div",{class:"modal-sheet"},[
      h("h2",{class:"ft-display",style:{fontSize:"18px",margin:"0 0 6px",color:"#22201D"}},"Your Anthropic API key"),
      h("p",{style:{fontSize:"12.5px",color:"#8A8375",margin:"0 0 12px",lineHeight:"1.5"}},
        "Needed for the app to look up calories from what you type. It's stored only on this device (never sent anywhere but Anthropic's API), and usage is billed to your own account."),
      input,
      h("div",{style:{display:"flex",gap:"8px"}},[
        h("button",{class:"ft-btn",onClick:()=>saveApiKey(val),style:{flex:"1",background:"#22201D",color:"#EFE8D8",border:"none",borderRadius:"9px",padding:"11px 0",fontSize:14,fontWeight:"600"}},"Save"),
        h("button",{class:"ft-btn",onClick:()=>{state.showSettings=false; render();},style:{background:"none",border:"1px solid #C9C2B0",color:"#8A8375",borderRadius:"9px",padding:"11px 14px",fontSize:14}},"Cancel")
      ]),
      h("a",{href:"https://console.anthropic.com/settings/keys",target:"_blank",rel:"noopener",style:{display:"block",marginTop:"12px",fontSize:"12px",color:"#5C7A5C",textAlign:"center"}},"Get an API key →")
    ])
  ]);
}

function BMICalcModal(){
  let p = { ...state.profile };

  const field = (label, inputEl) => h("div",{style:{marginBottom:"10px"}},[
    h("label",{style:{display:"block",fontSize:"11px",color:"#8A8375",marginBottom:"3px"}},label),
    inputEl
  ]);
  const textInputStyle = {width:"100%",boxSizing:"border-box",padding:"10px 11px",borderRadius:"9px",border:"1px solid #C9C2B0",fontSize:14,fontFamily:"'Space Mono',monospace"};
  const selectStyle = {width:"100%",boxSizing:"border-box",padding:"10px 11px",borderRadius:"9px",border:"1px solid #C9C2B0",fontSize:14,background:"#fff"};

  const heightInput = h("input",{type:"number",inputmode:"decimal",placeholder:"e.g. 172",value:p.height,style:textInputStyle});
  heightInput.addEventListener("input",e=>{ p.height=e.target.value; refreshResult(); });
  const weightInput = h("input",{type:"number",inputmode:"decimal",placeholder:"e.g. 78",value:p.weight,style:textInputStyle});
  weightInput.addEventListener("input",e=>{ p.weight=e.target.value; refreshResult(); });
  const ageInput = h("input",{type:"number",inputmode:"numeric",placeholder:"e.g. 38",value:p.age,style:textInputStyle});
  ageInput.addEventListener("input",e=>{ p.age=e.target.value; refreshResult(); });

  const sexSelect = h("select",{style:selectStyle},[
    h("option",{value:"male",selected:p.sex==="male"},"Male"),
    h("option",{value:"female",selected:p.sex==="female"},"Female")
  ]);
  sexSelect.addEventListener("change",e=>{ p.sex=e.target.value; refreshResult(); });

  const activitySelect = h("select",{style:selectStyle},[
    h("option",{value:"1.2",selected:p.activity==="1.2"},"Sedentary (little/no exercise)"),
    h("option",{value:"1.375",selected:p.activity==="1.375"},"Light (1-3 days/week)"),
    h("option",{value:"1.55",selected:p.activity==="1.55"},"Moderate (3-5 days/week)"),
    h("option",{value:"1.725",selected:p.activity==="1.725"},"Active (6-7 days/week)"),
    h("option",{value:"1.9",selected:p.activity==="1.9"},"Very active (physical job/2x training)")
  ]);
  activitySelect.addEventListener("change",e=>{ p.activity=e.target.value; refreshResult(); });

  const goalSelect = h("select",{style:selectStyle},[
    h("option",{value:"lose",selected:p.goalType==="lose"},"Lose weight (~0.5kg/week)"),
    h("option",{value:"maintain",selected:p.goalType==="maintain"},"Maintain weight"),
    h("option",{value:"gain",selected:p.goalType==="gain"},"Gain weight")
  ]);
  goalSelect.addEventListener("change",e=>{ p.goalType=e.target.value; refreshResult(); });

  const resultBox = h("div",{style:{background:"#FBF8F0",border:"1px solid #E3DCC7",borderRadius:"10px",padding:"12px",margin:"12px 0",textAlign:"center"}});
  const applyBtn = h("button",{class:"ft-btn",style:{flex:"1",background:"#22201D",color:"#EFE8D8",border:"none",borderRadius:"9px",padding:"11px 0",fontSize:14,fontWeight:"600"}},"Use as my calorie goal");

  function refreshResult(){
    const w = parseFloat(p.weight), ht = parseFloat(p.height), age = parseInt(p.age,10);
    resultBox.innerHTML = "";
    if (!w || !ht || !age){
      resultBox.appendChild(h("p",{style:{fontSize:"12px",color:"#8A8375",margin:"0"}},"Enter height, weight, and age to see your BMI and suggested calories."));
      applyBtn.setAttribute("disabled","true");
      applyBtn.style.background = "#C9C2B0";
      return;
    }
    const bmi = bmiValue(w, ht);
    const cat = bmiCategory(bmi);
    const bmr = calcBMR(w, ht, age, p.sex);
    const cals = suggestedCalories(bmr, parseFloat(p.activity), p.goalType);
    resultBox.appendChild(h("div",{class:"ft-mono",style:{fontSize:"20px",fontWeight:"700",color:"#22201D"}},bmi.toFixed(1)));
    resultBox.appendChild(h("div",{style:{fontSize:"11px",color:"#8A8375",marginBottom:"8px"}},`BMI · ${cat}`));
    resultBox.appendChild(h("div",{class:"ft-mono",style:{fontSize:"17px",fontWeight:"700",color:"#5C7A5C"}},cals+" cal/day"));
    resultBox.appendChild(h("div",{style:{fontSize:"10.5px",color:"#8A8375",marginTop:"2px"}},"suggested daily target"));
    applyBtn.removeAttribute("disabled");
    applyBtn.style.background = "#22201D";
    applyBtn.onclick = ()=>{ saveProfile(p); saveGoal(String(cals)); state.showBMIModal=false; render(); };
  }
  refreshResult();

  return h("div",{class:"modal-overlay",onClick:(e)=>{ if(e.target.classList.contains("modal-overlay")){ state.showBMIModal=false; render(); } }},[
    h("div",{class:"modal-sheet",style:{maxHeight:"85vh",overflowY:"auto"}},[
      h("h2",{class:"ft-display",style:{fontSize:"18px",margin:"0 0 6px",color:"#22201D"}},"Calculate your calorie goal"),
      h("p",{style:{fontSize:"12.5px",color:"#8A8375",margin:"0 0 12px",lineHeight:"1.5"}},
        "Based on your BMI and daily activity, using the Mifflin-St Jeor formula."),
      h("div",{style:{display:"flex",gap:"8px"}},[
        h("div",{style:{flex:"1"}},[field("Height (cm)", heightInput)]),
        h("div",{style:{flex:"1"}},[field("Weight (kg)", weightInput)]),
        h("div",{style:{flex:"1"}},[field("Age", ageInput)])
      ]),
      field("Sex", sexSelect),
      field("Activity level", activitySelect),
      field("Goal", goalSelect),
      resultBox,
      h("div",{style:{display:"flex",gap:"8px"}},[
        applyBtn,
        h("button",{class:"ft-btn",onClick:()=>{state.showBMIModal=false; render();},style:{background:"none",border:"1px solid #C9C2B0",color:"#8A8375",borderRadius:"9px",padding:"11px 14px",fontSize:14}},"Close")
      ])
    ])
  ]);
}

function render(){
  const root = $("#root");
  root.innerHTML = "";
  const t = totals();
  const pct = Math.min(100, Math.round((t.cal/state.goal)*100)) || 0;
  const remaining = state.goal - t.cal;
  const overGoal = t.cal > state.goal;

  // header
  const header = h("div",{style:{padding:"16px 16px 12px",borderBottom:"1px solid #DDD4BC",background:"#EFE8D8"}});
  header.appendChild(h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between"}},[
    h("h1",{class:"ft-display",style:{fontSize:"21px",fontWeight:"700",color:"#22201D",margin:"0"}},"Nutrition"),
    h("div",{style:{display:"flex",alignItems:"center",gap:"12px"}},[
      SyncBadge(),
      h("button",{class:"ft-btn","aria-label":"Settings",onClick:()=>{state.showSettings=true;render();},
        style:{background:"none",border:"none",fontSize:"16px",color:"#8A8375",padding:"0"}},"⚙")
    ])
  ]));
  header.appendChild(h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:"12px",margin:"8px 0 10px"}},[
    h("button",{class:"ft-btn","aria-label":"Previous day",onClick:()=>shiftDay(-1),style:{background:"none",border:"none",color:"#22201D",fontSize:"16px",padding:"4px"}},"‹"),
    h("span",{style:{fontSize:"13px",fontWeight:"600",color:"#22201D",minWidth:"100px",textAlign:"center"}},prettyDate(state.dateKey)),
    h("button",{class:"ft-btn","aria-label":"Next day",onClick:()=>shiftDay(1),disabled:isToday(),
      style:{background:"none",border:"none",color:isToday()?"#C9C2B0":"#22201D",fontSize:"16px",padding:"4px",cursor:isToday()?"default":"pointer"}},"›")
  ]));
  header.appendChild(h("div",{style:{height:"9px",background:"#DFD6BE",borderRadius:"999px",overflow:"hidden"}},[
    h("div",{style:{height:"100%",width:pct+"%",background:overGoal?"#B0503B":"#5C7A5C",transition:"width .4s ease, background .3s ease"}})
  ]));
  header.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",margin:"6px 0 12px",alignItems:"center"}},[
    h("span",{class:"ft-mono",style:{fontSize:"13px",color:"#22201D",fontWeight:"700"}},[t.cal+" ",h("span",{style:{fontWeight:"400",color:"#8A8375"}},"/ "+state.goal+" cal")]),
    h("div",{style:{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:overGoal?"#B0503B":"#5C7A5C",fontWeight:"500"}},
      overGoal ? `${Math.abs(remaining)} over` : `${remaining} left`)
  ]));
  header.appendChild(h("div",{style:{display:"flex",gap:"8px"}},[
    MacroCard("🥩","PROTEIN",t.protein,"#8B3A62"),
    MacroCard("🌾","CARBS",t.carbs,"#C9A227"),
    MacroCard("💧","FAT",t.fat,"#5C7A5C")
  ]));

  if (state.showGoalEdit){
    let gv = String(state.goal);
    const gi = h("input",{type:"number",value:gv,style:{width:"80px",padding:"5px 7px",borderRadius:"7px",border:"1px solid #C9C2B0",fontSize:"12px",fontFamily:"'Space Mono',monospace"}});
    gi.addEventListener("input",e=>gv=e.target.value);
    header.appendChild(h("div",{style:{marginTop:"10px",display:"flex",gap:"6px",alignItems:"center"}},[
      gi, h("button",{class:"ft-btn",onClick:()=>saveGoal(gv),style:{fontSize:"11px",background:"#22201D",color:"#EFE8D8",border:"none",borderRadius:"7px",padding:"5px 10px"}},"Save")
    ]));
  } else {
    header.appendChild(h("div",{style:{marginTop:"8px",display:"flex",gap:"12px"}},[
      h("button",{class:"ft-btn",onClick:()=>{state.showGoalEdit=true;render();},
        style:{fontSize:"11px",color:"#8A8375",background:"none",border:"none",textDecoration:"underline",padding:"0"}},"Edit calorie goal"),
      h("button",{class:"ft-btn",onClick:()=>{state.showBMIModal=true;render();},
        style:{fontSize:"11px",color:"#5C7A5C",background:"none",border:"none",textDecoration:"underline",padding:"0"}},"Calculate from BMI")
    ]));
  }
  root.appendChild(header);

  // feed
  const feed = h("div",{style:{flex:"1",overflowY:"auto",padding:"14px 16px 8px"}});
  if (state.entries.length===0){
    feed.appendChild(h("div",{style:{textAlign:"center",padding:"26px 10px",color:"#8A8375"}},[
      h("p",{style:{fontSize:"13px",margin:"0"}}, isToday() ? 'Log something — try "tea" or "2 idli and coffee".' : "Nothing logged this day.")
    ]));
  } else {
    [...state.entries].reverse().forEach(e=>{
      const card = h("div",{class:"ft-fade-in",style:{background:"#FBF8F0",border:"1px solid #E3DCC7",borderRadius:"12px",padding:"10px 12px",marginBottom:"10px"}});
      card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}},[
        h("span",{class:"ft-mono",style:{fontSize:"10px",color:"#8A8375"}},fmtTime(e.ts)),
        isToday() ? h("button",{class:"ft-btn","aria-label":"Remove entry",onClick:()=>removeEntry(e.id),
          style:{background:"none",border:"none",color:"#B0503B",padding:"2px"}},"🗑") : null
      ]));
      e.items.forEach((it,i)=>{
        const row = h("div",{style:{padding:"4px 0",borderTop:i>0?"1px dashed #E3DCC7":"none"}});
        row.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"14px",color:"#22201D"}},[
          h("span",{},it.name), h("span",{class:"ft-mono",style:{color:"#5C7A5C",fontWeight:"700"}},it.calories+" cal")
        ]));
        row.appendChild(h("div",{class:"ft-mono",style:{fontSize:"10.5px",color:"#8A8375",marginTop:"2px"}},`P ${it.protein}g · C ${it.carbs}g · F ${it.fat}g`));
        card.appendChild(row);
      });
      feed.appendChild(card);
    });
  }
  if (state.thinking){
    feed.appendChild(h("div",{class:"ft-fade-in",style:{display:"flex",justifyContent:"flex-start",marginBottom:"10px"}},[
      h("div",{style:{background:"#FBF8F0",border:"1px solid #E3DCC7",borderRadius:"12px",padding:"10px 14px",display:"flex",gap:"4px"}},[
        h("span",{class:"ft-dot"}), h("span",{class:"ft-dot"}), h("span",{class:"ft-dot"})
      ])
    ]));
  }
  root.appendChild(feed);
  feed.scrollTop = feed.scrollHeight;

  if (state.error){
    root.appendChild(h("p",{style:{fontSize:"12px",color:"#B0503B",textAlign:"center",margin:"0 16px 8px"}},state.error));
  }

  if (isToday()){
    const bar = h("div",{style:{display:"flex",gap:"8px",padding:"10px 16px 18px",borderTop:"1px solid #DDD4BC",background:"#EFE8D8"}});
    const inputEl = h("input",{value:state.input,placeholder:'e.g. "tea" or "2 idli and coffee"',disabled:state.thinking,
      style:{flex:"1",padding:"11px 13px",borderRadius:"22px",border:"1px solid #C9C2B0",fontSize:"14px",background:"#fff"}});
    inputEl.addEventListener("input",e=>state.input=e.target.value);
    inputEl.addEventListener("keydown",e=>{ if(e.key==="Enter") handleSend(); });
    const sendBtn = h("button",{class:"ft-btn","aria-label":"Send",onClick:handleSend,disabled:state.thinking||!state.input.trim(),
      style:{width:"42px",height:"42px",borderRadius:"50%",border:"none",background:(state.thinking||!state.input.trim())?"#C9C2B0":"#22201D",color:"#EFE8D8",flexShrink:"0",fontSize:"16px"}},"➤");
    bar.appendChild(inputEl); bar.appendChild(sendBtn);
    root.appendChild(bar);
    setTimeout(()=>{ if(document.activeElement!==inputEl) {} },0);
  }

  if (state.showSettings){ root.appendChild(SettingsModal()); }
  if (state.showBMIModal){ root.appendChild(BMICalcModal()); }
}

render();

if ("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
</body>
</html>
